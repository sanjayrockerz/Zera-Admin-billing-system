<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Sri Siddha</title>
    <link rel="stylesheet" href="../css/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0;400,0;500,0;600,0&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#faf9f6] text-textMain font-body">

    <!-- Header -->
    <header class="bg-white sticky top-0 z-40 border-b border-gray-100 shadow-sm">
        <div class="container-main py-4 flex items-center justify-between gap-4">
            <a href="index.html" class="flex flex-col items-center flex-shrink-0 group">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-accentPrimary text-3xl">spa</span>
                    <h1 class="text-xl font-bold font-headline text-[#be1e2d]">SRI SIDDHA</h1>
                </div>
            </a>
            
            <nav class="hidden md:flex items-center gap-6 font-semibold text-sm">
                <a href="index.html" class="hover:text-accentPrimary transition-colors">Home</a>
                <a href="products.html" class="hover:text-accentPrimary transition-colors">Shop</a>
                <a href="billing.html" class="hover:text-accentPrimary transition-colors">Billing</a>
                <a href="dashboard.html" class="hover:text-accentPrimary transition-colors">Dashboard</a>
            </nav>

            <a href="cart.html" class="relative flex p-2 hover:bg-bgMain rounded-full text-textMuted hover:text-accentPrimary transition-all">
                <span class="material-symbols-outlined text-2xl">shopping_bag</span>
                <span id="cart-count" class="absolute top-0 right-0 bg-accentPrimary text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
            </a>
        </div>
    </header>

    <main class="container-main py-12 flex flex-col lg:flex-row gap-8 min-h-[70vh]">
        
        <!-- Cart Items List -->
        <div class="w-full lg:w-2/3 bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100 h-fit">
            <h2 class="text-2xl font-bold font-headline border-b pb-4 mb-4 text-textMain">Shopping Cart</h2>
            <div id="cart-items-container">
                <!-- Javascript will populate this -->
            </div>
            <a href="products.html" class="inline-flex items-center gap-2 text-accentPrimary hover:text-[#8ba97f] font-bold text-sm mt-6 group">
                <span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span> Continue Shopping
            </a>
        </div>

        <!-- Order Summary -->
        <div class="w-full lg:w-1/3 text-textMain sticky top-28 h-fit">
            <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100 mb-6 font-medium">
                <h3 class="text-xl font-bold font-headline border-b pb-4 mb-4">Order Summary</h3>
                <div class="flex justify-between mb-3 text-sm">
                    <span class="text-textMuted">Subtotal</span>
                    <span id="cart-subtotal" class="font-bold">₹0</span>
                </div>
                <div class="flex justify-between mb-3 text-sm">
                    <span class="text-textMuted">Estimated Tax (5%)</span>
                    <span id="cart-tax" class="font-bold">₹0</span>
                </div>
                <div class="flex justify-between mb-4 border-b border-dashed pb-4 text-sm">
                    <span class="text-textMuted">Shipping</span>
                    <span class="text-accentPrimary font-bold">Free</span>
                </div>
                <div class="flex justify-between mb-6">
                    <span class="font-bold text-lg">Total</span>
                    <span id="cart-summary-total" class="text-xl font-bold text-[#be1e2d]">₹0</span>
                </div>
                <button class="w-full bg-[#00a651] hover:bg-[#008c44] text-white py-4 rounded-xl font-bold text-sm uppercase tracking-wider shadow-[0_8px_16px_rgba(0,166,81,0.2)] active:scale-95 transition-all outline-none">
                    Proceed to Checkout
                </button>

                <div class="mt-6 flex flex-col gap-2 border-t pt-4">
                    <span class="flex items-center justify-center gap-1 text-xs text-textMuted">
                        <span class="material-symbols-outlined text-[14px]">lock</span> Secure 256-bit SSL encryption.
                    </span>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script src="../js/cart.js"></script>
</body>
</html>
